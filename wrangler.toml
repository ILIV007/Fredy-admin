# Fredy — Cloudflare Worker Configuration v2.4.0

name = "fredy-admin"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "Fredy_SETTINGS"
id = "5361932dda4544358b92e9341f3e77ef"

# Cron triggers DISABLED — using external cron via /internal/tick
# [triggers]
# crons = ["*/15 * * * *"]

[vars]
TARGET_CHANNEL = "@ILIVIR3"
FOOTER_TEXT = "🌀 @ILIVIR3"
DEBUG_MODE = "false"
DEFAULT_AI_PROVIDER = "gemini"
DEFAULT_LANGUAGE = "auto"
SCHEDULER_TIMEZONE = "Asia/Tehran"
SCHEDULE_SLOTS = "08:00,10:00,12:00,14:00,16:00,18:00,20:00,22:00,23:00"
SCHEDULE_JITTER_MINUTES = "25"

# Secrets: BOT_TOKEN, ADMIN_ID, GEMINI_API_KEY, OPENROUTER_API_KEY, CRON_KEY, DEBUG_TOKEN

[observability]
enabled = true
