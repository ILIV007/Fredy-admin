# ============================================================
# Fredy — Cloudflare Worker Configuration
# Fredy Worker configuration. App version is in VERSION file and
# src/core/constants.ts (APP_VERSION). This config version tracks the
# wrangler.toml schema, not the app version.
# Phase: Production Deployment
# ============================================================

name = "fredy-admin"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ============================================================
# KV Namespaces
# ============================================================
# Fredy uses a single KV namespace with key prefixes (fredy:*)
# for efficient free-tier usage. All data is namespaced by prefix:
#   fredy:settings:*   — runtime config
#   fredy:state:*      — runtime state
#   fredy:queue:*      — content queue
#   fredy:dlq:*        — dead-letter queue
#   fredy:sched:*      — scheduler data
#   fredy:dedup:*      — duplicate detection
#   fredy:history:*    — publish history
#   fredy:source:*     — source caches
#   fredy:plugin:*     — plugin status
#   fredy:debug:*      — debug logs
#   fredy:convo:*      — admin conversations
#   fredy:approve:*    — approve-mode posts
#   fredy:mg:*         — media group buffering
#   fredy:soul         — soul.md override
#   fredy:global:*     — global stats

[[kv_namespaces]]
binding = "Fredy_SETTINGS"
id = "5361932dda4544358b92e9341f3e77ef"
# preview_id = "REPLACE_WITH_PREVIEW_KV_ID"  # for wrangler dev

# ============================================================
# D1 Database (Optional — Analytics)
# ============================================================
# Uncomment to enable D1 for relational analytics.
# Free tier: 5GB storage, 5M reads/day.
#
# [[d1_databases]]
# binding = "FREDY_DB"
# database_name = "fredy-analytics"
# database_id = "REPLACE_WITH_D1_DATABASE_ID"

# ============================================================
# Cron Triggers — v12.0.8 Hybrid Architecture
# ============================================================
# Fredy v12.0.8 uses a HYBRID cron architecture:
#   - Cloudflare Cron: time-critical operations (scheduler + maintenance)
#   - External cron (cron-job.org): background provider refresh
#
# Layer 1 — SCHEDULER WATCHER (Cloudflare Cron, every 20 minutes):
#   "*/20 * * * *"
#   Lightweight: loads daily plan (1 KV read), checks if a post's
#   scheduledTime has been reached. If yes → full publish pipeline.
#   If no → returns immediately (0 KV writes on the no-due path).
#   This is the ONLY trigger that publishes posts. Expected delay
#   between scheduledTime and actual publish: 0-20 minutes.
#
# Layer 2 — PROVIDER REFRESH (External cron-job.org, every 2 hours):
#   Calls GET /internal/provider-refresh?key=<CRON_KEY>
#   Fetches content from providers (GitHub, Dev.to, Reddit, News),
#   maintains queue depth, applies adaptive backoff. Does NOT
#   publish posts — only content preparation. Respects queue depth
#   (skips providers whose queue is already full).
#   v12.0.8: Moved to external cron — provider refresh is NOT
#   latency-sensitive, so it doesn't need Cloudflare's precise timing.
#   This reduces Cloudflare Worker wakeups by 12/day.
#
# Layer 3 — DAILY MAINTENANCE (Cloudflare Cron, every 24 hours):
#   "0 0 * * *"
#   Generates tomorrow's daily plan (with fresh random scheduledTime
#   per window), cleans expired KV data, resets daily counters,
#   updates statistics. Runs at midnight UTC.
#
# Cloudflare Free Plan: 5 cron triggers max — we use 2. ✓
# External cron-job.org: 1 trigger (provider refresh every 2h). ✓
# KV limits: 100K reads/day, 1K writes/day — well under. ✓
# The /internal/tick endpoint is retained for manual triggers.

[triggers]
crons = ["*/20 * * * *", "0 0 * * *"]

# ============================================================
# Environment Variables (Non-Secret)
# ============================================================
# These are set in wrangler.toml and are NOT secret.
# Secrets are set via `wrangler secret put` or Cloudflare dashboard.

[vars]
# --- Telegram (non-secret) ---
TARGET_CHANNEL = "@ILIVIR3"
FOOTER_TEXT = "🌀 @ILIVIR3"

# --- Debug ---
DEBUG_MODE = "false"
DEFAULT_AI_PROVIDER = "gemini"

# --- Language ---
DEFAULT_LANGUAGE = "auto"

# --- Scheduler ---
SCHEDULER_TIMEZONE = "Asia/Tehran"
SCHEDULE_SLOTS = "09:00,13:00,18:00,22:00"
SCHEDULE_JITTER_MINUTES = "30"

# --- Manager UI ---
MANAGER_URL = "https://fredy-admin.iliv007-34b.workers.dev/Manager"

# ============================================================
# Secrets (DO NOT put values here!)
# ============================================================
# Set via: wrangler secret put <NAME>
# Or via Cloudflare dashboard: Workers > fredy > Settings > Variables
#
# REQUIRED (secrets):
#   ADMIN_ID              — your Telegram numeric user ID (secret!)
#   BOT_TOKEN             — from @BotFather
#   GEMINI_API_KEY        — from https://aistudio.google.com/apikey
#   OPENROUTER_API_KEY    — from https://openrouter.ai/keys
#   CRON_KEY              — random string for /internal/tick auth
#
# RECOMMENDED (secrets):
#   WEBHOOK_SECRET        — random string for webhook verification
#   DEBUG_TOKEN           — random string for /Manager protection
#
# OPTIONAL (secrets for content sources):
#   NEWSAPI_KEY           — from https://newsapi.org
#   NASA_API_KEY          — from https://api.nasa.gov
#   GITHUB_TOKEN          — from https://github.com/settings/tokens
#
# OPTIONAL (enhancement):
#   GITHUB_TOKEN           — from https://github.com/settings/tokens (higher rate limit)
# ============================================================

# ============================================================
# Observability
# ============================================================
# Enable Cloudflare Workers Logs for debugging.
# View with: wrangler tail

[observability]
enabled = true

# ============================================================
# Limits (Cloudflare Free Tier)
# ============================================================
# - 100,000 requests/day
# - 10ms CPU time per request (can be extended)
# - 1,000 KV writes/day, 100,000 KV reads/day
# - 5 cron triggers per Worker
# - 1 MB Worker size limit
#
# Fredy is designed to work within these limits:
# - Batched stats (reduces KV writes)
# - In-memory config cache (reduces KV reads)
# - Efficient cron (1-minute tick is sufficient)
# ============================================================
