# ============================================================
# Fredy — Cloudflare Worker Configuration
# Version: 1.5.3
# ============================================================

name = "fredy-admin"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ============================================================
# KV Namespaces
# ============================================================
[[kv_namespaces]]
binding = "Fredy_SETTINGS"
id = "64f76bc1a74346cc969a007f3a322050"

# ============================================================
# Cron Triggers — DISABLED (account limit reached)
# ============================================================
# Using external cron (cron-job.org) via /tick endpoint only.
# Set up at: https://cron-job.org
#   URL: https://<your-worker>.workers.dev/tick?key=<CRON_KEY>
#   Schedule: Every 5 minutes

# [triggers]
# crons = ["*/5 * * * *"]

# ============================================================
# Environment Variables (Non-Secret)
# ============================================================
[vars]
TARGET_CHANNEL = "@ILIVIR3"
FOOTER_TEXT = "🌀 @ILIVIR3"
DEBUG_MODE = "false"
DEFAULT_AI_PROVIDER = "gemini"
DEFAULT_LANGUAGE = "auto"
SCHEDULER_TIMEZONE = "Asia/Tehran"
SCHEDULE_SLOTS = "09:00,13:00,18:00,22:00"
SCHEDULE_JITTER_MINUTES = "30"

# ============================================================
# Secrets (set via `wrangler secret put` or dashboard):
#   BOT_TOKEN              — from @BotFather
#   ADMIN_ID               — your Telegram user ID
#   GEMINI_API_KEY         — from https://aistudio.google.com/apikey
#   OPENROUTER_API_KEY     — from https://openrouter.ai/keys
#   CRON_KEY               — random string for /tick endpoint auth
#   WEBHOOK_SECRET         — random string for webhook verification
#   DEBUG_TOKEN            — random string for /debug protection
# ============================================================

[observability]
enabled = true
